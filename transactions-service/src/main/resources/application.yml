spring:
  application:
    name: transactions-service
  r2dbc:
    url: ${TRANSACTIONS_R2DBC_URL:r2dbc:postgresql://localhost:5435/transactionsdb}
    username: ${TRANSACTIONS_DB_USER:msa}
    password: ${TRANSACTIONS_DB_PASSWORD:msa}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
  profiles:
    default: postgres
  zipkin:
    base-url: ${ZIPKIN_BASE_URL:http://localhost:9411}

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
