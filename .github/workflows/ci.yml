name: CI

on:
  push:
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and run tests
        run: mvn -B -ntp test -Dspring.profiles.active=in-memory -Dspring.sql.init.mode=never
