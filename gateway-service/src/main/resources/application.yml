spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200,http://localhost:4201,http://localhost:4202"
            allowedMethods: "GET,OPTIONS"
            allowedHeaders: "*"
      routes:
        - id: customers-service
          uri: http://localhost:8081
          predicates:
            - Path=/v1/customers/**
          filters:
            - StripPrefix=1
        - id: accounts-service
          uri: http://localhost:8082
          predicates:
            - Path=/v1/accounts/**
          filters:
            - StripPrefix=1
        - id: transactions-service
          uri: http://localhost:8083
          predicates:
            - Path=/v1/transactions/**
          filters:
            - StripPrefix=1
  security:
    oauth2:
      resourceserver:
        jwt:
          # 256-bit Base64-encoded HMAC-SHA256 secret
          # Override via JWT_SECRET env var in any non-local environment
          secret: ${JWT_SECRET:bXNhLXBvYy1zZWNyZXQta2V5LWF0LWxlYXN0LTI1Ni1iaXRz}
  zipkin:
    base-url: ${ZIPKIN_BASE_URL:http://localhost:9411}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  tracing:
    sampling:
      probability: 1.0
